# Klove backend on Fly.io → https://agents.klovehealth.com
# Deploy:  fly launch --no-deploy   then   fly secrets set DATABASE_URL=... (all keys)   then   fly deploy
# Custom domain:  fly certs add agents.klovehealth.com  (then add the CNAME in Squarespace DNS)
app = "klove-backend"
# Pin to the SAME AWS region as your Supabase project to minimize DB latency (e.g. iad=us-east-1,
# sjc=us-west, ord=us-central). Change to match your Supabase region.
primary_region = "iad"

[build]

[env]
  PORT = "8080"
  PUBLIC_BASE_URL = "https://agents.klovehealth.com"
  WHATSAPP_TRANSPORT = "baileys"
  # Baileys WhatsApp session creds live on the persistent volume (see [mounts]) so the dedicated
  # Klove number stays paired across deploys/restarts. First deploy prints a QR in `fly logs` to scan.
  BAILEYS_AUTH_DIR = "/data/baileys-auth"

# Persistent volume for the WhatsApp (Baileys) session credentials. Create once before first deploy:
#   fly volumes create klove_data --region iad --size 1 -a klove-backend
# Keep the app to a SINGLE machine — Baileys is one socket per number; multiple machines would each
# try to connect and duplicate. (One volume naturally pins one machine.)
[mounts]
  source = "klove_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  # Keep one machine always running so the background workers (scheduler/ingestion/extraction/
  # reminders/concierge reconcile) keep ticking — do NOT scale to zero.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "1024mb" # headroom for Playwright/Chromium
